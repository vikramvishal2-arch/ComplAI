# Production stack: PostgreSQL + ComplAI app
# Usage:
#   1. Copy .env.production.example to .env.production and fill values
#   2. docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#   3. docker compose -f docker-compose.prod.yml --profile tools run --rm tools npx tsx prisma/demo-seed.ts

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-grc_platform}
    volumes:
      - grc_postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-grc} -d ${POSTGRES_DB:-grc_platform}']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-grc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-grc_platform}?schema=public
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-${APP_URL:-http://localhost:3000}}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      NEXT_PUBLIC_INTEGRATION_HELP_BASE_URL: ${NEXT_PUBLIC_INTEGRATION_HELP_BASE_URL:-https://propelreadysolutions.in/help/integrations}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      DEMO_ACCESS_PASSWORD: ${DEMO_ACCESS_PASSWORD:-}
      DEMO_PORTAL_ENABLED: ${DEMO_PORTAL_ENABLED:-false}
      DEMO_SESSION_SECRET: ${DEMO_SESSION_SECRET:-}
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
      CONTACT_INQUIRY_TO: ${CONTACT_INQUIRY_TO:-}
      CONTACT_INQUIRY_FROM: ${CONTACT_INQUIRY_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      CHRONICLE_ENABLED: ${CHRONICLE_ENABLED:-false}
      AWS_MONITOR_ENABLED: ${AWS_MONITOR_ENABLED:-false}
      AZURE_MONITOR_ENABLED: ${AZURE_MONITOR_ENABLED:-false}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      KIBANA_URL: ${KIBANA_URL:-http://kibana:5601}
      KIBANA_PUBLIC_URL: ${KIBANA_PUBLIC_URL:-}
      # TPRM external intelligence (Shodan · Censys · VirusTotal · NVD · HIBP)
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      CENSYS_API_TOKEN: ${CENSYS_API_TOKEN:-}
      CENSYS_PAT: ${CENSYS_PAT:-}
      CENSYS_ORG_ID: ${CENSYS_ORG_ID:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
      HIBP_API_KEY: ${HIBP_API_KEY:-}
    volumes:
      - grc_uploads:/app/uploads
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  tools:
    profiles: [tools]
    build:
      context: .
      target: tools
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-grc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-grc_platform}?schema=public
    entrypoint: ['npx', 'tsx']

  elasticsearch:
    profiles: [analytics]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    restart: unless-stopped
    mem_limit: 1280m
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      xpack.security.http.ssl.enabled: 'false'
      bootstrap.memory_lock: 'false'
      cluster.routing.allocation.disk.threshold_enabled: 'false'
      ES_JAVA_OPTS: -Xms384m -Xmx384m
    volumes:
      - grc_es_prod:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s

  kibana:
    profiles: [analytics]
    image: docker.elastic.co/kibana/kibana:8.15.0
    restart: unless-stopped
    mem_limit: 1024m
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: 'false'
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: grc-platform-kibana-encryption-key-32
      CSP_STRICT: 'false'
      CSP_FRAMES_ANCESTORS: '["''self''","http://localhost:3000","http://127.0.0.1:3000"]'
      NODE_OPTIONS: --max-old-space-size=768
    ports:
      - '127.0.0.1:5601:5601'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:5601/api/status || exit 1']
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  grc_postgres_prod:
  grc_uploads:
  grc_es_prod:
