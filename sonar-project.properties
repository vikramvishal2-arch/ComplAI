# SonarQube / SonarCloud project for ComplAI GRC platform
# Docs: https://docs.sonarsource.com/sonarqube-server/latest/analyzing-source-code/scanners/sonarscanner/

sonar.projectKey=grc-platform
sonar.projectName=ComplAI GRC Platform
sonar.projectVersion=0.1.0

# Source roots (TypeScript / Next.js app)
sonar.sources=src,prisma,scripts
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json

# Exclusions — build artifacts, deps, generated, local caches
sonar.exclusions=\
**/node_modules/**,\
**/.next/**,\
**/dist/**,\
**/coverage/**,\
**/public/**,\
**/*.min.js,\
**/prisma/migrations/**,\
**/.cursor/**,\
**/privacy-platform/**

# Never treat secrets / env as source
sonar.global.exclusions=**/.env,**/.env.*,**/*.pem,**/*.key
