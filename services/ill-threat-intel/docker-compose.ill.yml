# ILL Threat Intel — NSP edge stack (Redis cache + Kong API Gateway)
# Run alongside the main app: docker compose -f docker-compose.yml -f services/ill-threat-intel/docker-compose.ill.yml up -d

services:
  ill-redis:
    image: redis:7-alpine
    container_name: ill-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - ill_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  ill-kong:
    image: kong:3.7
    container_name: ill-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: '0.0.0.0:8001'
      KONG_PROXY_LISTEN: '0.0.0.0:8000'
    ports:
      - '8000:8000'
      - '8001:8001'
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
      - ill_kong_logs:/var/log/kong
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      ill-redis:
        condition: service_healthy

volumes:
  ill_redis_data:
  ill_kong_logs:
