# ComplAI Lab — HTTPS at domain ROOT (recommended for pilot)
# Avoids /complAI/Lab path stripping issues with Next.js assets/links.
# URL: https://13-201-29-172.sslip.io/

server {
    listen 80;
    listen [::]:80;
    server_name 13-201-29-172.sslip.io 13.201.29.172;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://13-201-29-172.sslip.io$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 13-201-29-172.sslip.io 13.201.29.172;

    ssl_certificate /etc/letsencrypt/live/13-201-29-172.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/13-201-29-172.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}
