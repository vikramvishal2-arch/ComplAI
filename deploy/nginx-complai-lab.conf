# ComplAI Lab — HTTPS + /complAI/Lab path (no Next.js basePath required)
#
# Recommended domain: lab.propelreadysolutions.in (DNS A record → EC2 public IP)
# Immediate HTTPS (no DNS): 13-233-254-149.sslip.io
#
# Install:
#   sudo cp deploy/nginx-complai-lab.conf /etc/nginx/sites-available/complai-lab
#   sudo ln -sf /etc/nginx/sites-available/complai-lab /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default /etc/nginx/sites-enabled/complai
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d 13-233-254-149.sslip.io
#
# Open AWS security group ports 80 and 443.

server {
    listen 80;
    listen [::]:80;
    server_name lab.propelreadysolutions.in 13-233-254-149.sslip.io 13.233.254.149;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://13-233-254-149.sslip.io/complAI/Lab$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lab.propelreadysolutions.in 13-233-254-149.sslip.io 13.233.254.149;

    ssl_certificate /etc/letsencrypt/live/13-233-254-149.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/13-233-254-149.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 16m;

    location = /complAI/Lab {
        return 301 https://$host/complAI/Lab/;
    }

    location /complAI/Lab/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    location /_next/ {
        proxy_pass http://127.0.0.1:3000/_next/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(complai|propel|favicon|training-narration|uploads)(/|$) {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        return 301 https://$host/complAI/Lab/;
    }

    location / {
        return 301 https://$host/complAI/Lab$request_uri;
    }
}
