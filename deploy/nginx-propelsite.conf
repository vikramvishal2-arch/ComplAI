# Nginx reverse proxy for propelreadysolutions.in
# Install on Ubuntu VPS:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo cp deploy/nginx-propelsite.conf /etc/nginx/sites-available/propelreadysolutions.in
#   sudo ln -s /etc/nginx/sites-available/propelreadysolutions.in /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d propelreadysolutions.in -d www.propelreadysolutions.in

server {
    listen 80;
    listen [::]:80;
    server_name propelreadysolutions.in www.propelreadysolutions.in;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
