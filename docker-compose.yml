services:
  postgres:
    image: postgres:16-alpine
    container_name: grc-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: grc
      POSTGRES_PASSWORD: grc_dev_password
      POSTGRES_DB: grc_platform
    volumes:
      - grc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U grc -d grc_platform']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  grc_postgres_data:
