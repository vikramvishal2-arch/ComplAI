services:
  postgres:
    image: postgres:16-alpine
    container_name: grc-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: grc
      POSTGRES_PASSWORD: grc_dev_password
      POSTGRES_DB: grc_platform
    volumes:
      - grc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U grc -d grc_platform']
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: grc-elasticsearch
    restart: on-failure:3
    mem_limit: 1536m
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - bootstrap.memory_lock=false
      - cluster.routing.allocation.disk.threshold_enabled=false
      - ES_JAVA_OPTS=-Xms384m -Xmx384m
    ports:
      - '9200:9200'
    volumes:
      - grc_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: grc-kibana
    restart: on-failure:3
    mem_limit: 1024m
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=grc-platform-local-kibana-encryption-key-32
      - CSP_STRICT=false
      - CSP_FRAMES_ANCESTORS=["'self'","http://localhost:3000","http://127.0.0.1:3000"]
      - NODE_OPTIONS=--max-old-space-size=768
    ports:
      - '5601:5601'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:5601/api/status || exit 1']
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  grc_postgres_data:
  grc_es_data:
